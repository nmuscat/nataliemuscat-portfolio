    <!-- ================================================
         MASONRY GRID
         ================================================

         HOW TO ADD YOUR PHOTOS
         ──────────────────────
         Each photo is a <div class="masonry-item"> containing an <img>.
         The masonry layout handles all sizing automatically — just drop
         in images at their natural aspect ratios.

         1. Save your photos into the images/ folder
         2. For each photo, replace a placeholder block like this:

            BEFORE (placeholder):
            <div class="masonry-item">
              <div class="masonry-placeholder" style="height:260px;">
                <span>your-photo.jpg</span>
              </div>
            </div>

            AFTER (real photo):
            <div class="masonry-item">
              <img src="images/your-photo.jpg" alt="Brief description of the shot" />
            </div>

         3. Add or remove <div class="masonry-item"> blocks to match
            however many photos you have. Order them however you like —
            the browser handles column placement automatically.

         TIP: For best results, export photos at 1200px wide, saved as
         high-quality JPG. WebP also works and loads faster.
    -->
    <section class="masonry" aria-label="Photo gallery">

      <div class="masonry-item reveal">
        <div class="masonry-placeholder" style="height:100%;">
          <img src="images/Full_Jeep-Rear.jpeg" alt="Image of a Jeep Wrangler from behind on a sandy overlook"></div>
      </div>

      <div class="masonry-item reveal reveal-delay-1">
        <div class="masonry-placeholder" style="height:100%;">
          <img src="images/BFG_Tire_Focus-Rocks.jpeg" alt="Image of a Jeep Wrangler BFG Tire as the main focus"></div>

      <!-- <div class="masonry-item reveal reveal-delay-2">
